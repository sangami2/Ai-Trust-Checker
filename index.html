      AI Trust Checker Privacy Policy:
      We do not collect, store, or sell any personal data.
      No user accounts or login is required to use this tool.
      No cookies are set. No analytics or tracking scripts are used. No ads.
      When you submit text or a URL for analysis, it is sent in real-time to Anthropic's API (Claude) for processing and is immediately discarded — we do not log, save, or retain your input.
      Anthropic's own privacy policy governs how they handle API requests: https://www.anthropic.com/privacy.
      This app is open source. It is hosted on Vercel, whose infrastructure privacy policy applies to hosting: https://vercel.com/legal/privacy-policy.
      No behavioural profiling. No third-party advertising. No data sold to any party.
      You have nothing to opt out of because we collect nothing.
      Contact: https://github.com/sangami2/Ai-Trust-Checker
    " />

    <meta name="og:title" content="AI Trust Checker" />
    <meta name="og:description" content="Know what AI tools do with your data — in plain English. No legal speak. Free, no account needed, zero data stored." />
